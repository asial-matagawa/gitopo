<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gitopo</title>
</head>
<body>
  <div id="loading">
    <div class="loading-spinner"></div>
    <div id="loading-status">Initializing...</div>
  </div>
  <div id="app">
    <div id="controls">
      <div id="repo-name"></div>
      <button id="refresh-btn" title="Fetch & Refresh (Ctrl+R)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6"/>
          <path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
      <div class="commit-limit">
        <label>Commits:</label>
        <input type="number" id="commit-limit" value="1000" min="1" max="100000000">
      </div>
      <div class="branch-selector">
        <label>Branch 1:</label>
        <select id="branch1"></select>
      </div>
      <div class="branch-selector">
        <label>Branch 2:</label>
        <select id="branch2"></select>
      </div>
      <div class="branch-selector">
        <label>Branch 3:</label>
        <select id="branch3"></select>
      </div>
      <div id="settings-container">
        <button id="settings-btn" title="Settings">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div id="settings-menu" class="hidden">
          <div class="settings-option">
            <label for="merge-commit-style">Merge commits:</label>
            <select id="merge-commit-style">
              <option value="circle">Circle</option>
              <option value="filled-square">Filled square</option>
              <option value="hollow-square" selected>Hollow square</option>
            </select>
          </div>
          <div class="settings-option">
            <label for="merge-edge-style">Merge edges:</label>
            <select id="merge-edge-style">
              <option value="dashed" selected>Dashed</option>
              <option value="solid">Solid</option>
            </select>
          </div>
          <div class="settings-option checkbox">
            <label>
              <input type="checkbox" id="show-prs" checked>
              Show pull requests
            </label>
          </div>
        </div>
      </div>
    </div>
    <svg id="graph"></svg>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
